<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STT proto</title>

</head>

<body>
  <h1>STT proto</h1>

  <!-- Mic midt på skjermen -->
  <button id="micButton" title="Start/stopp opptak">🎤</button>

  <div id="status"></div>
  <div id="timings"></div>

  <!-- Filopplasting under -->
  <div class="upload-row">
    <input id="fileInput" type="file" accept="audio/*" />
    <button id="uploadBtn">Last opp og transkriber</button>
  </div>

  <!-- Output -->
  <div id="output">
    <div class="box">
      <h2>Møtereferat</h2>
      <pre id="minutes">Ingen data ennå.</pre>
    </div>

    <div class="box">
      <h2>Transkripsjon</h2>
      <a id="toggleTranscription" class="toggle-link">▼ Vis transkripsjon</a>
      <div id="transcriptionWrap" class="hidden" style="margin-top: 12px;">
        <pre id="transcription">Ingen data ennå.</pre>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:8000/transcribe";

    const micButton = document.getElementById("micButton");
    const statusEl = document.getElementById("status");
    const timingsEl = document.getElementById("timings");

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");

    const minutesEl = document.getElementById("minutes");
    const transcriptionEl = document.getElementById("transcription");

    const toggleLink = document.getElementById("toggleTranscription");
    const transcriptionWrap = document.getElementById("transcriptionWrap");

    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function clearTimings() {
      timingsEl.innerHTML = "";
    }

    function renderTimings(t) {
      if (!t) {
        clearTimings();
        return;
      }
      const tr = t.transcription ?? "?";
      const su = t.summarization ?? "?";
      const to = t.total ?? "?";
      timingsEl.innerHTML = `
        Tidsbruk — Transkribering: <b>${tr}</b>s • Oppsummering: <b>${su}</b>s • Total: <b>${to}</b>s
      `;
    }

    function setWorkingState() {
      minutesEl.textContent = "Jobber...";
      transcriptionEl.textContent = "Jobber...";
      clearTimings();
    }

    async function sendAudio(fileOrBlob, filename) {
      setStatus("Sender til transkribering...");
      setWorkingState();

      const fd = new FormData();
      fd.append("file", fileOrBlob, filename);

      const res = await fetch(API_URL, {
        method: "POST",
        body: fd
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || ("HTTP " + res.status));
      }

      const data = await res.json();

      minutesEl.textContent = data.meeting_minutes || "";
      transcriptionEl.textContent = data.transcription || "";
      renderTimings(data.timings_seconds || null);

      setStatus("Ferdig!");
    }

    // Toggle transkripsjon
    toggleLink.addEventListener("click", () => {
      const hidden = transcriptionWrap.classList.contains("hidden");
      if (hidden) {
        transcriptionWrap.classList.remove("hidden");
        toggleLink.textContent = "▲ Skjul transkripsjon";
      } else {
        transcriptionWrap.classList.add("hidden");
        toggleLink.textContent = "▼ Vis transkripsjon";
      }
    });

    // Mic: start/stop + auto-upload ved stopp
    micButton.addEventListener("click", async () => {
      try {
        if (!isRecording) {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];

          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };

          mediaRecorder.onstop = async () => {
            // frigjør mic
            stream.getTracks().forEach(t => t.stop());

            const blob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });

            try {
              await sendAudio(blob, "audio.webm");
            } catch (err) {
              setStatus("Feil: " + (err?.message || err));
              minutesEl.textContent = "Feil.";
              transcriptionEl.textContent = "Feil.";
              clearTimings();
            }
          };

          mediaRecorder.start();
          isRecording = true;
          setStatus("Opptak pågår... trykk igjen for å stoppe");
        } else {
          mediaRecorder.stop();
          isRecording = false;
          setStatus("Ferdig! Laster opp opptaket...");
        }
      } catch (err) {
        setStatus("Feil med mikrofon: " + (err?.message || err));
      }
    });

    // Filopplasting-knapp
    uploadBtn.addEventListener("click", async () => {
      const f = fileInput.files?.[0];
      if (!f) {
        setStatus("Velg en lydfil først.");
        return;
      }

      try {
        await sendAudio(f, f.name || "audio.wav");
      } catch (err) {
        setStatus("Feil: " + (err?.message || err));
        minutesEl.textContent = "Feil.";
        transcriptionEl.textContent = "Feil.";
        clearTimings();
      }
    });
  </script>
</body>
</html>
