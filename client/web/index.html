<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT proto 2</title>

    <!-- KOBLING TIL CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>STT proto 1</h1>

    <button id="micButton">🎤</button>
    <div id="status">Trykk på mikrofonen for å starte opptak.</div>

    <div id="output"></div>

    <script>
        const micButton = document.getElementById("micButton");
        const statusDiv = document.getElementById("status");
        const outputDiv = document.getElementById("output");

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        micButton.addEventListener("click", async () => {
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.start();

                isRecording = true;
                statusDiv.textContent = "Opptak pågår... Trykk for å stoppe.";
                micButton.style.backgroundColor = "#1d3557";

            } else {
                mediaRecorder.stop();
                isRecording = false;
                statusDiv.textContent = "Behandler lyd...";

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
                    const formData = new FormData();
                    formData.append("file", audioBlob, "audio.wav");

                    const response = await fetch("http://127.0.0.1:8000/transcribe", {
                        method: "POST",
                        body: formData
                    });

                    const data = await response.json();

                    // Output content
                    outputDiv.innerHTML = `
                        <div class="box">
                            <h2>Møtereferat</h2>
                            <pre>${data.meeting_minutes}</pre>

                            <hr>

                            <a href="#" id="toggleTranscription" class="toggle-link">
                                ▶ Se transkripsjon
                            </a>

                            <div id="transcriptionBox" class="hidden">
                                <pre>${data.transcription}</pre>
                            </div>
                        </div>
                    `;

                    // Toggle
                    const toggle = document.getElementById("toggleTranscription");
                    const box = document.getElementById("transcriptionBox");

                    toggle.addEventListener("click", (e) => {
                        e.preventDefault();

                        if (box.classList.contains("hidden")) {
                            box.classList.remove("hidden");
                            toggle.textContent = "▼ Skjul transkripsjon";
                        } else {
                            box.classList.add("hidden");
                            toggle.textContent = "▶ Se transkripsjon";
                        }
                    });

                    statusDiv.textContent = "Ferdig! Trykk mikrofonen for nytt opptak.";
                    micButton.style.backgroundColor = "#e63946";
                };
            }
        });
    </script>

</body>
</html>
